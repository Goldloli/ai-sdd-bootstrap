name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e '.[dev]'

      - name: Run tests with coverage
        run: pytest

      - name: Smoke test CLI
        run: |
          ai-sdd --help
          ai-sdd validate --help
          mkdir /tmp/smoke-test && cd /tmp/smoke-test
          ai-sdd init --primary-stack python
          ai-sdd bootstrap-foundation
          ai-sdd status --json
          ai-sdd validate --json
          ai-sdd add-adr --dry-run --title "Test ADR" --background "b" --decision "d" --consequences "c"
          ai-sdd add-spec --dry-run --title "Test Spec" --in-scope "i" --out-scope "o"
